<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/utility.css" />
    <title>Spotify - Web Player: Music for everyone</title>
  </head>
  <body>
    <div class="container flex bg-black">
      <div class="left bg-black">
        <div class="close">
          <img src="img/close.svg" alt="">
        </div>
        <div class="home bg-grey rounded m-1 p-1">
          <div class="logo">
            <img     width ="119" class="invert" src="img/logo.svg" alt="logo" />
          </div>
          <ul>
            <li><img class="invert" src="img/home.svg" alt="home" />Home</li>
            <li><img class="invert" src="img/search.svg" alt="search" />Search</li>
          </ul>
        </div>
        <div class="library bg-grey rounded m-1 p-1">
          
          <div class="heading">
            <img src="img/playlist.svg" alt="" />
            <h2>Your library</h2>
          </div>

          <div class="songList">
            <ul>
               <!-- here list ofsongs -->
            </ul>
          </div>
        
          <div class="footer">
            
              <div><a href="https://www.spotify.com/in-en/legal/">Legal</a></div>
              <div><a href="https://www.spotify.com/in-en/safetyandprivacy/">Safety & Privacy Center</a></div>
              <div><a href="https://www.spotify.com/in-en/legal/privacy-policy/">Privacy Policy</a></div>
              <div><a href="https://www.spotify.com/in-en/legal/cookies-policy/">Cookies</a></div>
              <div><a href="https://www.spotify.com/in-en/legal/privacy-policy/#s3">About Ads</a></div>
              <div><a href="https://www.spotify.com/in-en/accessibility/">Accessibility</a></div>
              
          </div>
        </div>
      </div> 

      
      <div class="right bg-grey rounded ">
        <div class="header rounded">
          <div class="nav">
            <div class="hamburgerContainer">
              <img class="hamburger" src="img/hamburger.svg" alt="">
              
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" color="white" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M15 6C15 6 9.00001 10.4189 9 12C8.99999 13.5812 15 18 15 18"></path>
              </svg>

              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" color="currentColor" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M9.00005 18C9.00005 18 15 13.5811 15 12C15 10.4188 9 6 9 6"></path>
              </svg>  
            </div> 
          </div>
          <div class="buttons">
            <button class="signupbtn">Sign up</button>
            <button class="loginbtn">Log in</button>
          </div>
        </div>
        <div class="spotifyPlaylists">
          <h2>Spotify Playlists</h2>
          <div class="cardContainer">
 
          </div>
          <div class="playbar">
            <div class="seekbar">
              <div class="circle"></div>
            </div>
            <div class="songbar">
              <div class="songinfo">

              </div>
            
              <div class="songbuttons">
                <img  id="previous" src="img/prevsong.svg" alt="">
                <img  id="play" src="img/play1.svg" alt="">
                <img  id="next" src="img/nextsong.svg" alt="">
              </div>
              <div class="timeVol">
                <div class="songtime">

                </div>
                <div class="volume" >
                   <img  src="img/volume.svg" alt="">
                   <div class="range">
                      <input  type="range" name="range" id="Voltrack"  aria-label="Volume Control">
                   </div>
                </div>
              </div>
              
            </div>
          </div>
        </div>
        
      </div>

    </div>
    <script src="js/script.js"></script>
</body>
  </body>
</html>
